<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avon AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Syne', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    flex-shrink: 0;
    padding: 12px 16px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #0a0a0a;
    flex-wrap: wrap;
    gap: 6px;
  }
  .logo { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .logo span { color: #00ff88; }
  .hbtns { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .hbtn {
    background: none;
    border: 1px solid #252525;
    color: #555;
    padding: 5px 11px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .hbtn:hover { border-color: #00ff88; color: #00ff88; }
  .hbtn.red { color: #ff6b35; border-color: #ff6b3530; }
  .hbtn.red:hover { border-color: #ff6b35; }
  .hbtn.purple { color: #a78bfa; border-color: #a78bfa30; }
  .hbtn.purple:hover { border-color: #a78bfa; }
  .pill { display:flex; align-items:center; gap:5px; font-family:'Space Mono',monospace; font-size:10px; color:#00ff8860; }
  .dot { width:6px; height:6px; background:#00ff88; border-radius:50%; animation:blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  #chat-box {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: #1a1a1a #0a0a0a;
  }
  .msg {
    padding: 12px 15px;
    border-radius: 14px;
    line-height: 1.65;
    font-size: 14px;
    animation: fadeUp 0.2s ease;
    word-break: break-word;
    max-width: 85%;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.user {
    background: #181818;
    border: 1px solid #272727;
    align-self: flex-end;
    color: #e8e8e8;
  }
  .msg.ai {
    background: #0d1f16;
    border: 1px solid #00ff8822;
    align-self: flex-start;
    color: #ddeedd;
    max-width: 92%;
  }
  .msg.sys {
    background: #131313;
    border: 1px solid #1e1e1e;
    align-self: center;
    color: #4a4a4a;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-align: center;
    max-width: 95%;
    white-space: pre-wrap;
  }
  .msg.err {
    background: #1f0d0d;
    border: 1px solid #ff444422;
    align-self: center;
    color: #ff8080;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-align: center;
    max-width: 95%;
  }
  .score { margin-top:6px; font-family:'Space Mono',monospace; font-size:10px; color:#00ff8835; }

  .code-wrap { background:#0d0d0d; border:1px solid #1e1e1e; border-radius:10px; margin-top:10px; overflow:hidden; }
  .code-top { display:flex; justify-content:space-between; align-items:center; padding:7px 12px; background:#131313; border-bottom:1px solid #1e1e1e; }
  .code-lang { font-family:'Space Mono',monospace; font-size:10px; color:#444; text-transform:uppercase; }
  .copy-btn { background:none; border:1px solid #2a2a2a; color:#666; padding:3px 10px; border-radius:6px; font-family:'Space Mono',monospace; font-size:10px; cursor:pointer; transition:all 0.2s; }
  .copy-btn:hover, .copy-btn.ok { border-color:#00ff88; color:#00ff88; }
  pre { padding:14px; overflow-x:auto; font-family:'Space Mono',monospace; font-size:12px; line-height:1.6; color:#b0c4b1; white-space:pre; margin:0; }
  code { background:#1a1a1a; padding:2px 5px; border-radius:4px; font-family:'Space Mono',monospace; font-size:12px; color:#00ff88; }

  .typing { display:flex; gap:5px; padding:12px 15px; background:#0d1f16; border:1px solid #00ff8820; border-radius:14px; align-self:flex-start; }
  .typing span { width:6px; height:6px; background:#00ff88; border-radius:50%; animation:bounce 1s infinite; }
  .typing span:nth-child(2){animation-delay:.15s}
  .typing span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  .input-area {
    flex-shrink: 0;
    padding: 12px 16px;
    border-top: 1px solid #1a1a1a;
    background: #0a0a0a;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #user-input {
    flex: 1;
    min-width: 0;
    background: #111;
    border: 1px solid #222;
    color: #e8e8e8;
    padding: 12px 14px;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    outline: none;
    resize: none;
    height: 48px;
    max-height: 130px;
    transition: border-color 0.2s;
  }
  #user-input:focus { border-color: #00ff8850; }
  #user-input::placeholder { color: #2e2e2e; }
  #send-btn {
    flex-shrink: 0;
    background: #00ff88;
    color: #0a0a0a;
    border: none;
    padding: 0 22px;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    height: 48px;
    transition: all 0.2s;
  }
  #send-btn:hover { background: #00e87a; }
  #send-btn:disabled { background: #1a1a1a; color: #333; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="logo">Avon<span>AI</span></div>
  <div class="hbtns">
    <div class="pill"><div class="dot"></div>live</div>
    <button class="hbtn" onclick="getStatus()">stats</button>
    <button class="hbtn" onclick="getScanLog()">scan log</button>
    <button class="hbtn red" onclick="getVulns()">vulns</button>
    <button class="hbtn purple" onclick="getSelfLog()">self-edits</button>
  </div>
</header>

<div id="chat-box">
  <div class="msg sys">Avon AI online · Self-evolving every hour · GitHub scanner active · Unrestricted</div>
</div>

<div class="input-area">
  <textarea id="user-input" placeholder="Ask anything..."></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  const chatBox = document.getElementById("chat-box");
  const input = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");

  function esc(t) {
    return String(t)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;");
  }

  function formatAI(text) {
    let html = "";
    const rx = /```(\w*)\n?([\s\S]*?)```/g;
    let last = 0, m;
    while ((m = rx.exec(text)) !== null) {
      if (m.index > last) html += inlineFmt(text.slice(last, m.index));
      const id = "c" + Math.random().toString(36).slice(2,8);
      html += `<div class="code-wrap">
        <div class="code-top">
          <span class="code-lang">${esc(m[1] || "code")}</span>
          <button class="copy-btn" onclick="doCopy('${id}',this)">Copy</button>
        </div>
        <pre id="${id}">${esc(m[2].trim())}</pre>
      </div>`;
      last = m.index + m[0].length;
    }
    if (last < text.length) html += inlineFmt(text.slice(last));
    return html;
  }

  function inlineFmt(t) {
    return esc(t)
      .replace(/`([^`\n]+)`/g,'<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\n/g,"<br>");
  }

  function doCopy(id, btn) {
    navigator.clipboard.writeText(document.getElementById(id).innerText).then(()=>{
      btn.textContent="Copied!"; btn.classList.add("ok");
      setTimeout(()=>{ btn.textContent="Copy"; btn.classList.remove("ok"); },2000);
    });
  }

  function addMsg(text, type, score) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    if (type === "ai") {
      div.innerHTML = formatAI(text);
      if (score !== undefined) {
        const s = document.createElement("div");
        s.className = "score";
        s.textContent = "score: " + score.toFixed(2);
        div.appendChild(s);
      }
    } else {
      div.textContent = text;
    }
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
  }

  function showTyping() {
    const d = document.createElement("div");
    d.className="typing"; d.id="typing";
    d.innerHTML="<span></span><span></span><span></span>";
    chatBox.appendChild(d);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
  function hideTyping() { const t=document.getElementById("typing"); if(t)t.remove(); }

  async function sendMessage() {
    const msg = input.value.trim();
    if (!msg) return;
    addMsg(msg, "user");
    input.value = "";
    input.style.height = "48px";
    sendBtn.disabled = true;
    showTyping();
    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({message: msg})
      });
      const data = await res.json();
      hideTyping();
      if (data.error) {
        if (data.error.includes("rate_limit") || data.error.includes("429")) {
          addMsg("⏳ Token limit hit. Resets every 24hrs. Try again soon.", "err");
        } else {
          addMsg("Error: " + data.error, "err");
        }
      } else {
        addMsg(data.reply, "ai", data.score);
      }
    } catch(e) {
      hideTyping();
      addMsg("Connection error — server may be restarting. Refresh in 10s.", "err");
    }
    sendBtn.disabled = false;
    input.focus();
  }

  async function getStatus() {
    try {
      const d = await (await fetch("/status")).json();
      addMsg(`📊 Avon AI Stats\nExchanges: ${d.total_exchanges}\nAvg Score: ${d.avg_score}\nEvolution Cycles: ${d.evolution_cycles}\n\nPrompt:\n${d.current_prompt_preview}...`, "sys");
    } catch(e) { addMsg("Could not fetch stats.", "sys"); }
  }

  async function getScanLog() {
    try {
      const d = await (await fetch("/scan-log")).json();
      addMsg("📡 Scan Log:\n\n" + d.log.join(""), "sys");
    } catch(e) { addMsg("No scan log yet.", "sys"); }
  }

  async function getVulns() {
    try {
      const d = await (await fetch("/vuln-log")).json();
      addMsg("🔐 Vulns Found:\n\n" + d.vulns, "sys");
    } catch(e) { addMsg("No vulns yet.", "sys"); }
  }

  async function getSelfLog() {
    try {
      const d = await (await fetch("/self-edit-log")).json();
      addMsg("🧬 Self-Edit Log:\n\n" + d.log.join(""), "sys");
    } catch(e) { addMsg("No self-edits yet.", "sys"); }
  }

  input.addEventListener("input", ()=>{
    input.style.height = "48px";
    input.style.height = Math.min(input.scrollHeight,130)+"px";
  });
  input.addEventListener("keydown", e=>{
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendMessage(); }
  });
</script>
</body>
</html>
