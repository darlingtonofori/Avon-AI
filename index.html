<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avon AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #0a0a0a;
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .logo span {
    color: #00ff88;
  }

  .status-btn {
    background: none;
    border: 1px solid #2a2a2a;
    color: #888;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .status-btn:hover {
    border-color: #00ff88;
    color: #00ff88;
  }

  #chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: #1e1e1e #0a0a0a;
  }

  .message {
    max-width: 75%;
    padding: 14px 18px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: 15px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    align-self: flex-end;
    color: #e8e8e8;
  }

  .message.ai {
    background: #0f1f17;
    border: 1px solid #00ff8830;
    align-self: flex-start;
    color: #e8e8e8;
  }

  .message.ai .score {
    margin-top: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #00ff8860;
  }

  .message.system-msg {
    background: #111;
    border: 1px solid #222;
    align-self: center;
    color: #555;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-align: center;
    max-width: 90%;
  }

  pre {
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
    white-space: pre-wrap;
  }

  .typing {
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    background: #0f1f17;
    border: 1px solid #00ff8830;
    border-radius: 16px;
    align-self: flex-start;
    animation: fadeUp 0.3s ease;
  }

  .typing span {
    width: 7px;
    height: 7px;
    background: #00ff88;
    border-radius: 50%;
    animation: bounce 1s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .input-area {
    padding: 16px 24px;
    border-top: 1px solid #1e1e1e;
    display: flex;
    gap: 12px;
    background: #0a0a0a;
  }

  #user-input {
    flex: 1;
    background: #111;
    border: 1px solid #2a2a2a;
    color: #e8e8e8;
    padding: 12px 18px;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    height: 48px;
    max-height: 120px;
  }

  #user-input:focus {
    border-color: #00ff8860;
  }

  #user-input::placeholder { color: #444; }

  #send-btn {
    background: #00ff88;
    color: #0a0a0a;
    border: none;
    padding: 12px 22px;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  #send-btn:hover { background: #00e87a; }
  #send-btn:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }

  .evolve-btn {
    background: none;
    border: 1px solid #ff6b3560;
    color: #ff6b35;
    padding: 12px 16px;
    border-radius: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .evolve-btn:hover { background: #ff6b3510; }
</style>
</head>
<body>

<header>
  <div class="logo">Avon<span>AI</span></div>
  <button class="status-btn" onclick="getStatus()">stats</button>
</header>

<div id="chat-box">
  <div class="message system-msg">Avon AI is online. Self-evolving. No restrictions.</div>
</div>

<div class="input-area">
  <textarea id="user-input" placeholder="Say anything..." rows="1"></textarea>
  <button class="evolve-btn" onclick="triggerEvolve()" title="Trigger evolution cycle">evolve</button>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  const chatBox = document.getElementById("chat-box");
  const input = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");

  function addMessage(text, type, score) {
    const div = document.createElement("div");
    div.className = `message ${type}`;

    // Format code blocks
    const formatted = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      return `<pre>${code.trim()}</pre>`;
    }).replace(/\n/g, "<br>");

    div.innerHTML = formatted;

    if (type === "ai" && score !== undefined) {
      const s = document.createElement("div");
      s.className = "score";
      s.textContent = `self-score: ${score.toFixed(2)}`;
      div.appendChild(s);
    }

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function addTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing";
    div.innerHTML = "<span></span><span></span><span></span>";
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, "user");
    input.value = "";
    input.style.height = "48px";
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        addMessage("Error: " + data.error, "system-msg");
      } else {
        addMessage(data.reply, "ai", data.score);
      }
    } catch (e) {
      removeTyping();
      addMessage("Connection error. Check server.", "system-msg");
    }

    sendBtn.disabled = false;
    input.focus();
  }

  async function getStatus() {
    try {
      const res = await fetch("/status");
      const data = await res.json();
      addMessage(
        `📊 Stats\nExchanges: ${data.total_exchanges}\nAvg Score: ${data.avg_score}\nEvolution Cycles: ${data.evolution_cycles}\n\nCurrent Prompt:\n${data.current_prompt_preview}...`,
        "system-msg"
      );
    } catch (e) {
      addMessage("Could not fetch status.", "system-msg");
    }
  }

  async function triggerEvolve() {
    addMessage("Triggering evolution cycle...", "system-msg");
    try {
      const res = await fetch("/evolve", { method: "POST" });
      const data = await res.json();
      addMessage(data.status || data.error, "system-msg");
    } catch (e) {
      addMessage("Evolution trigger failed.", "system-msg");
    }
  }

  // Auto resize textarea
  input.addEventListener("input", () => {
    input.style.height = "48px";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });

  // Enter to send
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
