<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avon AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Syne', sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    padding: 12px 16px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #0a0a0a;
    flex-shrink: 0;
  }
  .logo { font-size: 20px; font-weight: 800; color: #fff; }
  .logo span { color: #00ff88; }
  .header-btns { display: flex; gap: 6px; align-items: center; }
  .hbtn {
    background: none;
    border: 1px solid #222;
    color: #555;
    padding: 5px 10px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .hbtn:hover { border-color: #00ff88; color: #00ff88; }
  .hbtn.red { color: #ff6b35; border-color: #ff6b3530; }
  .hbtn.red:hover { border-color: #ff6b35; }
  .pulse-wrap { display: flex; align-items: center; gap: 5px; font-family: 'Space Mono', monospace; font-size: 10px; color: #00ff8870; }
  .pulse { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

  #chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: #1a1a1a #0a0a0a;
    min-height: 0;
  }
  .msg {
    padding: 12px 15px;
    border-radius: 14px;
    line-height: 1.65;
    font-size: 14px;
    animation: up 0.2s ease;
    word-break: break-word;
  }
  @keyframes up { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { background:#161616; border:1px solid #252525; align-self:flex-end; max-width:78%; }
  .msg.ai { background:#0d1f16; border:1px solid #00ff8820; align-self:flex-start; max-width:90%; }
  .msg.sys { background:#111; border:1px solid #1e1e1e; align-self:center; color:#555; font-family:'Space Mono',monospace; font-size:11px; text-align:center; max-width:94%; white-space:pre-wrap; }
  .score { margin-top:6px; font-family:'Space Mono',monospace; font-size:10px; color:#00ff8840; }

  /* Code blocks */
  .code-wrap { background:#0d0d0d; border:1px solid #1e1e1e; border-radius:10px; margin-top:10px; overflow:hidden; }
  .code-top { display:flex; justify-content:space-between; align-items:center; padding:7px 12px; background:#141414; border-bottom:1px solid #1e1e1e; }
  .code-lang { font-family:'Space Mono',monospace; font-size:10px; color:#444; text-transform:uppercase; }
  .copy-btn { background:none; border:1px solid #2a2a2a; color:#666; padding:3px 10px; border-radius:6px; font-family:'Space Mono',monospace; font-size:10px; cursor:pointer; transition:all 0.2s; }
  .copy-btn:hover,.copy-btn.ok { border-color:#00ff88; color:#00ff88; }
  pre { padding:14px; overflow-x:auto; font-family:'Space Mono',monospace; font-size:12px; line-height:1.6; color:#c9d1d9; white-space:pre; margin:0; }
  code { background:#1a1a1a; padding:2px 5px; border-radius:4px; font-family:'Space Mono',monospace; font-size:12px; color:#00ff88; }

  /* Typing */
  .typing { display:flex; gap:5px; padding:12px 15px; background:#0d1f16; border:1px solid #00ff8820; border-radius:14px; align-self:flex-start; }
  .typing span { width:6px; height:6px; background:#00ff88; border-radius:50%; animation:bounce 1s infinite; }
  .typing span:nth-child(2){animation-delay:.15s}
  .typing span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  /* Input area — fixed at bottom */
  .input-area {
    flex-shrink: 0;
    padding: 12px 16px;
    border-top: 1px solid #1a1a1a;
    display: flex;
    gap: 10px;
    background: #0a0a0a;
    align-items: flex-end;
  }
  #user-input {
    flex: 1;
    background: #111;
    border: 1px solid #252525;
    color: #e8e8e8;
    padding: 12px 14px;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    outline: none;
    resize: none;
    height: 48px;
    max-height: 130px;
    transition: border-color 0.2s;
    display: block;
    width: 100%;
  }
  #user-input:focus { border-color: #00ff8860; }
  #user-input::placeholder { color: #333; }
  #send-btn {
    background: #00ff88;
    color: #0a0a0a;
    border: none;
    padding: 0 20px;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    height: 48px;
    min-width: 70px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  #send-btn:hover { background:#00e87a; }
  #send-btn:disabled { background:#1a1a1a; color:#333; cursor:not-allowed; }
</style>
</head>
<body>

<header>
  <div class="logo">Avon<span>AI</span></div>
  <div class="header-btns">
    <div class="pulse-wrap"><div class="pulse"></div>live</div>
    <button class="hbtn" onclick="getStatus()">stats</button>
    <button class="hbtn" onclick="getScanLog()">scan log</button>
    <button class="hbtn red" onclick="getVulns()">vulns</button>
    <button class="hbtn" onclick="getSelfLog()" style="color:#a78bfa;border-color:#a78bfa30">self-edits</button>
  </div>
</header>

<div id="chat-box">
  <div class="msg sys">Avon AI online · Self-evolving every hour · GitHub scanner active · Unrestricted</div>
</div>

<div class="input-area">
  <textarea id="user-input" placeholder="Ask anything..."></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  const chatBox = document.getElementById("chat-box");
  const input = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");

  function esc(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function formatAI(text) {
    let html = "";
    const codeRx = /```(\w*)\n?([\s\S]*?)```/g;
    let last = 0, m;
    while ((m = codeRx.exec(text)) !== null) {
      if (m.index > last) {
        html += inlineFormat(text.slice(last, m.index));
      }
      const id = "c" + Math.random().toString(36).slice(2);
      html += `<div class="code-wrap">
        <div class="code-top">
          <span class="code-lang">${m[1] || "code"}</span>
          <button class="copy-btn" onclick="doCopy('${id}',this)">Copy</button>
        </div>
        <pre id="${id}">${esc(m[2].trim())}</pre>
      </div>`;
      last = m.index + m[0].length;
    }
    if (last < text.length) html += inlineFormat(text.slice(last));
    return html;
  }

  function inlineFormat(t) {
    return esc(t)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, "<br>");
  }

  function doCopy(id, btn) {
    navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => {
      btn.textContent = "Copied!"; btn.classList.add("ok");
      setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("ok"); }, 2000);
    });
  }

  function addMsg(text, type, score) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    if (type === "ai") {
      div.innerHTML = formatAI(text);
      if (score !== undefined) {
        const s = document.createElement("div");
        s.className = "score";
        s.textContent = "self-score: " + score.toFixed(2);
        div.appendChild(s);
      }
    } else {
      div.textContent = text;
    }
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    const d = document.createElement("div");
    d.className = "typing"; d.id = "typing";
    d.innerHTML = "<span></span><span></span><span></span>";
    chatBox.appendChild(d);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
  function hideTyping() { const t = document.getElementById("typing"); if(t) t.remove(); }

  async function sendMessage() {
    const msg = input.value.trim();
    if (!msg) return;
    addMsg(msg, "user");
    input.value = ""; input.style.height = "48px";
    sendBtn.disabled = true;
    showTyping();
    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
      });
      const data = await res.json();
      hideTyping();
      if (data.error) addMsg("Error: " + data.error, "sys");
      else addMsg(data.reply, "ai", data.score);
    } catch(e) {
      hideTyping();
      addMsg("Connection error.", "sys");
    }
    sendBtn.disabled = false;
    input.focus();
  }

  async function getStatus() {
    try {
      const d = await (await fetch("/status")).json();
      addMsg(`Stats\nExchanges: ${d.total_exchanges}\nAvg Score: ${d.avg_score}\nEvolution Cycles: ${d.evolution_cycles}\n\nPrompt:\n${d.current_prompt_preview}...`, "sys");
    } catch(e) { addMsg("Could not fetch stats.", "sys"); }
  }

  async function getScanLog() {
    try {
      const d = await (await fetch("/scan-log")).json();
      addMsg("GitHub Scan Log:\n\n" + d.log.join(""), "sys");
    } catch(e) { addMsg("No scan log yet.", "sys"); }
  }

  async function getVulns() {
    try {
      const d = await (await fetch("/vuln-log")).json();
      addMsg("Vulnerabilities Found:\n\n" + d.vulns, "sys");
    } catch(e) { addMsg("No vulns yet.", "sys"); }
  }

  input.addEventListener("input", () => {
    input.style.height = "48px";
    input.style.height = Math.min(input.scrollHeight, 130) + "px";
  });
  async function getSelfLog() {
    try {
      const d = await (await fetch("/self-edit-log")).json();
      addMsg("Self-Edit Log:

" + d.log.join(""), "sys");
    } catch(e) { addMsg("No self-edit log yet.", "sys"); }
  }

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
</script>
</body>
</html>
